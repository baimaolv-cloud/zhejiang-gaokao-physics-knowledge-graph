<script>
const COMPREHENSIVE = [{"type": "力+电+磁综合", "title": "扫描隧道显微镜减振装置（电磁感应 + 动量定理 + 能量守恒）", "src": "2024年1月·浙江选考·第21题", "fig": "<svg viewBox=\"0 0 480 250\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:480px;width:100%;height:auto\"><defs><marker id=\"g1\" markerWidth=\"8\" markerHeight=\"8\" refX=\"4\" refY=\"4\" orient=\"auto\"><path d=\"M0 0 L8 4 L0 8 Z\" fill=\"#16a34a\"/></marker></defs><rect x=\"0\" y=\"0\" width=\"480\" height=\"250\" fill=\"#f8fafc\"/><line x1=\"50\" y1=\"18\" x2=\"430\" y2=\"18\" stroke=\"#334155\" stroke-width=\"3\"/><text x=\"240\" y=\"12\" text-anchor=\"middle\" font-size=\"10\" fill=\"#475569\">O′ 弹簧上端固定</text><path d=\"M240 18 q14 7 0 14 q-14 7 0 14 q14 7 0 14 q-14 7 0 14 q14 7 0 14 q-14 7 0 14\" fill=\"none\" stroke=\"#0ea5e9\" stroke-width=\"2\"/><text x=\"258\" y=\"52\" font-size=\"9\" fill=\"#0369a1\">弹簧 k，静伸长 Δx₀=mg/k</text><rect x=\"120\" y=\"92\" width=\"240\" height=\"12\" rx=\"2\" fill=\"#475569\"/><text x=\"240\" y=\"86\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0f172a\">绝缘减振平台（质量 m）</text><circle cx=\"160\" cy=\"128\" r=\"13\" fill=\"#fff\" stroke=\"#dc2626\" stroke-width=\"2\"/><circle cx=\"240\" cy=\"128\" r=\"13\" fill=\"#fff\" stroke=\"#dc2626\" stroke-width=\"2\"/><circle cx=\"320\" cy=\"128\" r=\"13\" fill=\"#fff\" stroke=\"#dc2626\" stroke-width=\"2\"/><text x=\"240\" y=\"120\" text-anchor=\"middle\" font-size=\"8\" fill=\"#dc2626\">线圈×3</text><text x=\"160\" y=\"131\" text-anchor=\"middle\" font-size=\"8\" fill=\"#dc2626\">r</text><text x=\"240\" y=\"131\" text-anchor=\"middle\" font-size=\"8\" fill=\"#dc2626\">R</text><rect x=\"146\" y=\"150\" width=\"28\" height=\"46\" fill=\"#e2e8f0\" stroke=\"#64748b\"/><rect x=\"226\" y=\"150\" width=\"28\" height=\"46\" fill=\"#e2e8f0\" stroke=\"#64748b\"/><rect x=\"306\" y=\"150\" width=\"28\" height=\"46\" fill=\"#e2e8f0\" stroke=\"#64748b\"/><text x=\"240\" y=\"212\" text-anchor=\"middle\" font-size=\"9\" fill=\"#475569\">铁磁体（辐向磁场 B，线圈各边均切割）</text><line x1=\"240\" y1=\"106\" x2=\"240\" y2=\"116\" stroke=\"#16a34a\" stroke-width=\"2\" marker-end=\"url(#g1)\"/><text x=\"250\" y=\"114\" font-size=\"9\" fill=\"#16a34a\">v₀</text></svg>", "knowledge": ["电磁感应（法拉第定律·安培力）", "动量定理", "能量守恒", "胡克定律"], "q": "如图，扫描隧道显微镜减振装置由绝缘减振平台和磁阻尼减振器组成。平台通过三根关于 O′O″ 轴对称的相同轻杆悬挂在轻弹簧的下端 O，弹簧上端固定悬挂在 O′ 点；三个相同的、关于 O′O″ 轴对称的减振器位于平台下方。每个减振器由通过绝缘轻杆固定在平台下表面的线圈和固定在桌面上能产生辐向磁场的铁磁体组成，辐向磁场分布关于线圈中心竖直轴对称，线圈所在处磁感应强度大小均为 B。处于静止状态的平台受到外界微小扰动，线圈在磁场中做竖直方向的阻尼运动。已知 t=0 时速度为 v₀（方向向下），t₁、t₂ 时刻的振幅分别为 A₁、A₂。平台和三个线圈的总质量为 m，弹簧的劲度系数为 k，每个线圈半径为 r、电阻为 R。弹簧弹性势能 E_p=½kΔx²。不计空气阻力，求：(1) 平台静止时弹簧的伸长量 Δx₀；(2) t=0 时，每个线圈所受到安培力 F 的大小；(3) 在 0~t₁ 时间内，每个线圈产生的焦耳热 Q；(4) 在 t₁~t₂ 时间内，弹簧弹力冲量 I_弹 的大小。", "breakdown": [{"step": "① 考点定位", "text": "压轴级「电磁感应 + 力学 + 动量/能量」综合，四问层层递进：(1)静平衡用胡克定律；(2)动生电动势→安培力（电磁感应）；(3)振动机械能损耗转为焦耳热（能量守恒）；(4)变力冲量用动量定理（I=Δp）。突破口：线圈在磁场中运动切割磁感线产生感应电流，进而受安培力阻尼——这是整题物理本质。"}, {"step": "② 模型建构", "text": "平台+线圈整体做竖直阻尼振动，弹簧提供回复力，安培力提供阻尼（与速度反向）。线圈切割磁感线：辐向磁场下线圈各边都切割，总有效切割长度=周长 2πr，E=B·(2πr)·v。感应电流 I_ind=E/R=B(2πr)v/R。每个线圈安培力 F=I_ind·(2πr)·B=B²(2πr)²v/R。"}, {"step": "③ 分步求解", "text": "(1) 静止 mg=kΔx₀ → Δx₀=mg/k。(2) t=0 速度 v₀：I_ind=B(2πr)v₀/R，F=B²(2πr)²v₀/R。(3) 0~t₁：振动能量减少量=焦耳热，系统初机械能 E₀=½mv₀²+½kA₁²，末态（t₁ 振幅 A₁）弹性势能 ½kA₁²、动能 0（振幅处速度为 0），故焦耳热 Q_总=½mv₀²−½kA₁²，每线圈 Q=⅓Q_总=⅙mv₀²−⅙kA₁²。(4) t₁~t₂ 取向上为正，初末均为振幅极值点（速度为 0、动量为 0），Δp=0；动量定理 I_弹+I_安−mg(t₂−t₁)=0 → I_弹 大小=mg(t₂−t₁)−I_安，其中 I_安=2×(2πrB)·Δq（三个线圈，Δq 为通过线圈电量变化）。"}, {"step": "④ 易错/陷阱", "text": "安培力是阻尼，方向始终与速度反向，不是恒力，不能用 F·t 直接代，必须用动量定理/积分。线圈「周长」是有效切割长度（辐向磁场，各段都切割，总长=周长 2πr）。三个线圈的焦耳热是「每个线圈」的，总损耗分到三个线圈（÷3）。动量定理「全程」：t₁、t₂ 均为振幅极值点、速度=0、动量=0，是关键简化。重力冲量不能漏：竖直方向重力始终有冲量 mgΔt。"}], "a": "(1) Δx₀=mg/k。(2) F=B²(2πr)²v₀/R。(3) 每线圈 Q=⅙mv₀²−⅙kA₁²。(4) 取向上为正，I_弹+I_安−mg(t₂−t₁)=0，I_弹 大小=mg(t₂−t₁)−I_安（I_安=2×2πrB·Δq，Δq 由电量关系求得）。"}, {"type": "力学多过程综合", "title": "探究物体间碰撞特性（圆周运动 + 机械能 + 动量守恒 + 弹簧）", "src": "2023年6月·浙江选考·第18题", "fig": "<svg viewBox=\"0 0 480 230\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:480px;width:100%;height:auto\"><defs><marker id=\"b2\" markerWidth=\"8\" markerHeight=\"8\" refX=\"4\" refY=\"4\" orient=\"auto\"><path d=\"M0 0 L8 4 L0 8 Z\" fill=\"#f59e0b\"/></marker></defs><rect x=\"0\" y=\"0\" width=\"480\" height=\"230\" fill=\"#f8fafc\"/><line x1=\"20\" y1=\"90\" x2=\"150\" y2=\"90\" stroke=\"#334155\" stroke-width=\"3\"/><text x=\"55\" y=\"82\" font-size=\"9\" fill=\"#475569\">AB·CD·传送带(μ=0.5)</text><path d=\"M150 90 A40 40 0 0 0 150 170\" fill=\"none\" stroke=\"#0ea5e9\" stroke-width=\"4\"/><text x=\"92\" y=\"132\" font-size=\"9\" fill=\"#0369a1\">R=0.4</text><text x=\"150\" y=\"102\" text-anchor=\"middle\" font-size=\"9\" fill=\"#0f172a\">D</text><text x=\"150\" y=\"188\" text-anchor=\"middle\" font-size=\"9\" fill=\"#0f172a\">F(最低点)</text><line x1=\"150\" y1=\"170\" x2=\"460\" y2=\"170\" stroke=\"#334155\" stroke-width=\"3\"/><text x=\"320\" y=\"188\" text-anchor=\"middle\" font-size=\"9\" fill=\"#475569\">FG（足够长）</text><circle cx=\"150\" cy=\"90\" r=\"9\" fill=\"#f59e0b\" stroke=\"#b45309\"/><text x=\"150\" y=\"93\" text-anchor=\"middle\" font-size=\"8\" fill=\"#fff\">a</text><text x=\"168\" y=\"120\" font-size=\"9\" fill=\"#b45309\">m, v₀=2√21</text><rect x=\"290\" y=\"154\" width=\"26\" height=\"16\" fill=\"#475569\"/><text x=\"303\" y=\"166\" text-anchor=\"middle\" font-size=\"8\" fill=\"#fff\">b</text><rect x=\"384\" y=\"154\" width=\"26\" height=\"16\" fill=\"#475569\"/><text x=\"397\" y=\"166\" text-anchor=\"middle\" font-size=\"8\" fill=\"#fff\">c</text><path d=\"M316 162 q6 -8 12 0 q6 8 12 0 q6 -8 12 0 q6 8 12 0 q6 -8 12 0 q6 8 12 0\" fill=\"none\" stroke=\"#16a34a\" stroke-width=\"1.5\"/><text x=\"355\" y=\"148\" text-anchor=\"middle\" font-size=\"8\" fill=\"#15803d\">弹簧 k=100</text><text x=\"303\" y=\"180\" text-anchor=\"middle\" font-size=\"8\" fill=\"#475569\">3m</text><text x=\"397\" y=\"180\" text-anchor=\"middle\" font-size=\"8\" fill=\"#475569\">2m</text></svg>", "knowledge": ["圆周运动向心力", "机械能守恒/动能定理", "动量守恒", "能量守恒", "弹簧模型"], "q": "为了探究物体间碰撞特性，设计了如图所示的实验装置。水平直轨道 AB、CD 和水平传送带平滑无缝连接，两半径均为 R=0.4m 的四分之一圆周组成的竖直细圆弧管道 DEF 与轨道 CD 和足够长的水平直轨道 FG 平滑相切连接。质量为 3m 的滑块 b 与质量为 2m 的滑块 c 用劲度系数 k=100N/m 的轻质弹簧连接，静置于轨道 FG 上。现有质量 m=0.12kg 的滑块 a 以初速度 v₀=2√21 m/s 从 D 处进入，经 DEF 管道后，与 FG 上的滑块 b 碰撞（时间极短）。已知传送带长 L=0.8m，以 v=2m/s 的速率顺时针转动，滑块 a 与传送带间的动摩擦因数 μ=0.5，其它摩擦和阻力均不计，各滑块均可视为质点，弹簧的弹性势能 E_p=½kx²（x 为形变量）。(1) 求滑块 a 到达圆弧管道 DEF 最低点 F 时速度大小 v_F 和所受支持力大小 F_N；(2) 若滑块 a 碰后返回到 B 点时速度 v_B=1m/s，求滑块 a、b 碰撞过程中损失的机械能 ΔE；(3) 若滑块 a 碰到滑块 b 立即被粘住，求碰撞后弹簧最大长度与最小长度之差 Δx。", "breakdown": [{"step": "① 考点定位", "text": "力学综合「大题」，串联「圆周运动 + 机械能 + 碰撞（动量守恒）+ 弹簧能量」。三问分别考：圆周最低点受力、碰撞机械能损失、粘连后弹簧振动极值。突破口：先由动能定理求 F 点速度，再步步为营。"}, {"step": "② 模型建构", "text": "D→F 为竖直圆弧管道，只有重力做功，机械能守恒（动能定理 mg·2R，下降高度 2R）。F 点：重力和支持力合力提供向心力（F_N−mg=mv_F²/R）。碰撞（b 静止、时间极短）→ 动量守恒。粘连=完全非弹性碰撞，之后 a-b 整体与 c 经弹簧作用，三者共速时弹簧形变量极值。"}, {"step": "③ 分步求解", "text": "(1) D→F 动能定理：mg·2R=½mv_F²−½mv₀²，代入 R=0.4、v₀=2√21 → v_F=10m/s；F 点 F_N−mg=mv_F²/R → F_N=mg+mv_F²/R=0.12×10+0.12×100/0.4=31.2N。(2) a 碰后返回 B：从 F 到 B 上升 2R 且过传送带摩擦，动能定理 −mg·2R−μmg·L=½mv_B²−½mva² → va=5m/s；碰撞动量守恒（向右正）mv_F=−mva+3mvb → vb=5m/s；ΔE=½mv_F²−½mva²−½·3m·vb²=0（弹性碰撞，无损失）。(3) 粘连：mv_F=(m+3m)v → v=2.5m/s；a-b 整体(4m)与 c(2m)经弹簧，三者共速 v′=5/3 m/s 时弹簧形变量极（最大或最小）；能量守恒求压缩量 x₁=0.1m，由对称性伸长量 x₂=0.1m，Δx=x₁+x₂=0.2m。"}, {"step": "④ 易错/陷阱", "text": "「两半径均为 R 的四分之一圆弧」组成竖直半圆管道，D 到 F 下降高度 2R（F 是最低点），不是 R。支持力方向：管道内 F 点支持力向上（F_N−mg 提供向心）。碰撞「时间极短」→ 动量守恒，需选对正方向（a 反弹则 va 取负）。返回 B 的路径含传送带摩擦做功（μmgL），别漏。粘连是完全非弹性碰撞，机械能有损失，但之后「整体+弹簧」系统机械能守恒。「最大长度与最小长度之差」= 伸长量+压缩量（x₂+x₁），不是只算一个。"}], "a": "(1) v_F=10m/s，F_N=31.2N。(2) ΔE=0（弹性碰撞）。(3) Δx=0.2m。"}, {"type": "力+热综合", "title": "绝热容器气体（自由膨胀 + 等压变化 + 活塞平衡 + 热力学第一定律）", "src": "2024年1月·浙江选考·第19题", "fig": "<svg viewBox=\"0 0 480 230\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:480px;width:100%;height:auto\"><defs><marker id=\"g3\" markerWidth=\"8\" markerHeight=\"8\" refX=\"4\" refY=\"4\" orient=\"auto\"><path d=\"M0 0 L8 4 L0 8 Z\" fill=\"#16a34a\"/></marker></defs><rect x=\"0\" y=\"0\" width=\"480\" height=\"230\" fill=\"#f8fafc\"/><rect x=\"110\" y=\"40\" width=\"250\" height=\"140\" fill=\"#fff\" stroke=\"#334155\" stroke-width=\"3\"/><line x1=\"60\" y1=\"180\" x2=\"420\" y2=\"180\" stroke=\"#334155\" stroke-width=\"3\"/><line x1=\"235\" y1=\"40\" x2=\"235\" y2=\"138\" stroke=\"#dc2626\" stroke-width=\"3\"/><text x=\"235\" y=\"158\" text-anchor=\"middle\" font-size=\"9\" fill=\"#dc2626\">隔板 A</text><text x=\"172\" y=\"95\" text-anchor=\"middle\" font-size=\"10\" fill=\"#94a3b8\">真空</text><text x=\"172\" y=\"110\" text-anchor=\"middle\" font-size=\"8\" fill=\"#94a3b8\">V₁=750</text><circle cx=\"290\" cy=\"80\" r=\"3\" fill=\"#0ea5e9\"/><circle cx=\"310\" cy=\"95\" r=\"3\" fill=\"#0ea5e9\"/><circle cx=\"330\" cy=\"75\" r=\"3\" fill=\"#0ea5e9\"/><circle cx=\"300\" cy=\"110\" r=\"3\" fill=\"#0ea5e9\"/><circle cx=\"325\" cy=\"120\" r=\"3\" fill=\"#0ea5e9\"/><text x=\"300\" y=\"135\" text-anchor=\"middle\" font-size=\"8\" fill=\"#0369a1\">V₁=750</text><text x=\"300\" y=\"30\" text-anchor=\"middle\" font-size=\"9\" fill=\"#0f172a\">状态1: T₁=300K, p₁=2.04×10⁵</text><rect x=\"356\" y=\"40\" width=\"8\" height=\"98\" fill=\"#475569\"/><text x=\"384\" y=\"78\" font-size=\"8\" fill=\"#475569\">活塞B S=100</text><line x1=\"364\" y1=\"92\" x2=\"412\" y2=\"92\" stroke=\"#16a34a\" stroke-width=\"2\" marker-end=\"url(#g3)\"/><text x=\"416\" y=\"86\" text-anchor=\"end\" font-size=\"9\" fill=\"#16a34a\">F</text><rect x=\"250\" y=\"150\" width=\"40\" height=\"14\" fill=\"#fef3c7\" stroke=\"#b45309\"/><text x=\"270\" y=\"172\" text-anchor=\"middle\" font-size=\"8\" fill=\"#b45309\">电阻丝 C</text></svg>", "knowledge": ["理想气体状态方程/实验定律", "热力学第一定律", "力平衡（活塞）", "可逆性"], "q": "如图，一个固定在水平面上的绝热容器被隔板 A 分成体积均为 V₁=750cm³ 的左右两部分。面积为 S=100cm² 的绝热活塞 B 被锁定，隔板 A 的左侧为真空，右侧中一定质量的理想气体处于温度 T₁=300K、压强 p₁=2.04×10⁵Pa 的状态 1。抽取隔板 A，右侧中的气体就会扩散到左侧中，最终达到状态 2。然后解锁活塞 B，同时施加水平恒力 F，仍使其保持静止，当电阻丝 C 加热时，活塞 B 能缓慢滑动（无摩擦），使气体达到温度 T₃=350K 的状态 3，气体内能增加 ΔU=63.8J。已知大气压强 p₀=1.01×10⁵Pa，隔板厚度不计。(1) 气体从状态 1 到状态 2 是___（选填可逆或不可逆）过程，分子平均动能___（选填增大、减小或不变）；(2) 求水平恒力 F 的大小；(3) 求电阻丝 C 放出的热量 Q。", "breakdown": [{"step": "① 考点定位", "text": "热学综合，串联「气体自由膨胀（不可逆）+ 等温/等压变化 + 活塞受力平衡 + 热力学第一定律」。突破口：分阶段处理——1→2 自由膨胀；2→3 等压加热。"}, {"step": "② 模型建构", "text": "1→2 抽隔板，气体向真空自由膨胀，不做功、不传热（绝热容器）→ 内能不变、温度不变（理想气体）→ 等温；自由膨胀不可逆。2→3 解锁活塞加恒力 F 保持静止后加热，活塞缓慢滑动→准静态、等压过程（活塞受力平衡，压强恒定=p₂）。活塞受力平衡：p₂S=p₀S+F。"}, {"step": "③ 分步求解", "text": "(1) 不可逆；不变（T 不变→平均动能不变）。(2) 1→2 等温：p₁V₁=p₂(2V₁) → p₂=p₁/2=1.02×10⁵Pa；活塞平衡 F=(p₂−p₀)S=(1.02×10⁵−1.01×10⁵)×100×10⁻⁴=10N。(3) 2→3 等压：V₁/T₁=V₃/T₃ → V₃=V₁·T₃/T₁=750×(350/300)=875cm³=1.75×10⁻³m³；气体对外做功 W=−p₂(V₃−2V₁)=−1.02×10⁵×(1.75×10⁻³−1.5×10⁻³)=−25.5J（外界对气体做功 −25.5J，即气体对外做 25.5J）；热力学第一定律 ΔU=W+Q → Q=ΔU−W=63.8−(−25.5)=89.3J（气体吸热）；电阻丝放出热量即气体吸收的热量 → Q_放=89.3J。"}, {"step": "④ 易错/陷阱", "text": "自由膨胀「不做功」：向真空膨胀，无外力抵抗，W=0（不是等温过程，但理想气体结果 T 不变）。状态 2 体积=2V₁（左右合计），不是 V₁。等压判据：活塞缓慢滑动且受恒力平衡→压强恒定=p₂（由平衡定，不是大气压）。热力学第一定律符号：ΔU=Q+W，W 为外界对气体做功，气体膨胀对外做功→W 为负；这里 ΔU=63.8（增）、W=−25.5 → Q=89.3（吸）。单位换算：S=100cm²=0.01m²，V 用 m³。"}], "a": "(1) 不可逆；不变。(2) F=10N。(3) Q=89.3J（气体吸收，电阻丝放出热量 89.3J）。"}, {"type": "实验设计综合", "title": "电阻测量与实验设计（内外接判定 + 等效替代 + 方案设计）", "src": "2021年6月·浙江选考·实验题", "fig": "<svg viewBox=\"0 0 480 230\" xmlns=\"http://www.w3.org/2000/svg\" style=\"max-width:480px;width:100%;height:auto\"><rect x=\"0\" y=\"0\" width=\"480\" height=\"230\" fill=\"#f8fafc\"/><text x=\"40\" y=\"36\" font-size=\"9\" fill=\"#475569\">电源</text><line x1=\"50\" y1=\"55\" x2=\"50\" y2=\"90\" stroke=\"#334155\" stroke-width=\"2\"/><line x1=\"44\" y1=\"62\" x2=\"56\" y2=\"62\" stroke=\"#334155\" stroke-width=\"3\"/><line x1=\"48\" y1=\"72\" x2=\"52\" y2=\"72\" stroke=\"#334155\" stroke-width=\"2\"/><line x1=\"50\" y1=\"90\" x2=\"90\" y2=\"90\" stroke=\"#334155\" stroke-width=\"2\"/><circle cx=\"100\" cy=\"90\" r=\"4\" fill=\"#fff\" stroke=\"#334155\" stroke-width=\"2\"/><line x1=\"105\" y1=\"85\" x2=\"120\" y2=\"95\" stroke=\"#334155\" stroke-width=\"2\"/><text x=\"100\" y=\"82\" text-anchor=\"middle\" font-size=\"8\" fill=\"#475569\">S</text><rect x=\"128\" y=\"82\" width=\"38\" height=\"16\" fill=\"#fff\" stroke=\"#334155\" stroke-width=\"2\"/><polygon points=\"147,78 143,85 151,85\" fill=\"#0ea5e9\"/><text x=\"147\" y=\"75\" text-anchor=\"middle\" font-size=\"8\" fill=\"#0369a1\">P</text><line x1=\"166\" y1=\"90\" x2=\"380\" y2=\"90\" stroke=\"#334155\" stroke-width=\"2\"/><circle cx=\"240\" cy=\"90\" r=\"4\" fill=\"#334155\"/><text x=\"240\" y=\"112\" text-anchor=\"middle\" font-size=\"8\" fill=\"#475569\">K 单刀双掷</text><line x1=\"240\" y1=\"90\" x2=\"240\" y2=\"60\" stroke=\"#dc2626\" stroke-width=\"2\"/><circle cx=\"300\" cy=\"60\" r=\"13\" fill=\"#fff\" stroke=\"#dc2626\" stroke-width=\"2\"/><text x=\"300\" y=\"63\" text-anchor=\"middle\" font-size=\"9\" fill=\"#dc2626\">A</text><line x1=\"313\" y1=\"60\" x2=\"380\" y2=\"60\" stroke=\"#dc2626\" stroke-width=\"2\"/><line x1=\"380\" y1=\"60\" x2=\"380\" y2=\"120\" stroke=\"#dc2626\" stroke-width=\"2\"/><line x1=\"240\" y1=\"90\" x2=\"240\" y2=\"150\" stroke=\"#2563eb\" stroke-width=\"2\"/><circle cx=\"300\" cy=\"150\" r=\"13\" fill=\"#fff\" stroke=\"#2563eb\" stroke-width=\"2\"/><text x=\"300\" y=\"153\" text-anchor=\"middle\" font-size=\"9\" fill=\"#2563eb\">V</text><line x1=\"313\" y1=\"150\" x2=\"380\" y2=\"150\" stroke=\"#2563eb\" stroke-width=\"2\"/><line x1=\"380\" y1=\"150\" x2=\"380\" y2=\"160\" stroke=\"#2563eb\" stroke-width=\"2\"/><rect x=\"360\" y=\"120\" width=\"40\" height=\"40\" fill=\"#fff\" stroke=\"#334155\" stroke-width=\"2\"/><text x=\"380\" y=\"144\" text-anchor=\"middle\" font-size=\"9\" fill=\"#0f172a\">R_x</text><line x1=\"380\" y1=\"160\" x2=\"380\" y2=\"195\" stroke=\"#334155\" stroke-width=\"2\"/><line x1=\"380\" y1=\"195\" x2=\"50\" y2=\"195\" stroke=\"#334155\" stroke-width=\"2\"/><line x1=\"50\" y1=\"195\" x2=\"50\" y2=\"90\" stroke=\"#334155\" stroke-width=\"2\"/><text x=\"252\" y=\"58\" font-size=\"8\" fill=\"#dc2626\">K掷1</text><text x=\"252\" y=\"153\" font-size=\"8\" fill=\"#2563eb\">K掷2</text><text x=\"240\" y=\"218\" text-anchor=\"middle\" font-size=\"8\" fill=\"#475569\">试触法：比较两次 U、I 变化大小定接法（电压变化大→外接；电流变化大→内接）</text></svg>", "knowledge": ["伏安法测电阻（内接/外接）", "误差分析（大内小外）", "等效替代法测电阻", "电路设计"], "q": "小李在实验室测量一电阻 R_x 的阻值。(1) 因电表内阻未知，用如图 1 所示电路来判定电流表该内接还是外接。正确连线后，合上开关 S，将滑动变阻器滑片 P 移至合适位置。单刀双掷开关 K 掷到 1，电压表读数为 U₁，电流表读数如图 2 所示为 I₁；将 K 掷到 2，电压表和电流表读数分别为 U₂、I₂。由此可知应采用电流表___（填内或外）接法。(2) 完成上述实验后，小李进一步尝试用其它方法：① 器材连线如图 3，请在虚线框中画出对应电路图；先将单刀双掷开关掷到左边，记录电流表读数，再将开关掷到右边，调节电阻箱阻值使电流表读数与前一次尽量相同，电阻箱示数如图 3。则待测电阻 R_x=___；此方法___（填有或无）明显实验误差，其理由是___。(3) 请根据题中给定电路且滑片 P 位置保持不变，给出另一种测量电阻的简要方案。注：具体电表读数需结合原卷图示；本题为真实浙江选考实验题，以方法设计为核心。", "breakdown": [{"step": "① 考点定位", "text": "电学实验「方法综合」——考的不是单一测量，而是「如何选接法 + 如何用替代法 + 如何自行设计另一种方案」。核心能力：误差分析、等效替代思想、电路设计。"}, {"step": "② 模型建构", "text": "内接/外接判定：比较电压表分流与电流表分压的相对影响（大电阻内接、小电阻外接；或直接由读数变化判断）。替代法：保持电路其他条件不变（滑片 P 不动、电流表读数相同=电路总电阻相同），用电阻箱替代 R_x，电阻箱示数=R_x，是等效替代。第三方案：可设计伏阻法（电压表+电阻箱，串联分压）或安阻法等，只要原理自洽、器材匹配。"}, {"step": "③ 分步求解", "text": "(1) 比较 K=1 与 K=2 两次：若电压表读数变化显著（ΔU 大）而电流变化小→电流表内阻分压不可忽略→用外接法（避开电流表分压误差）；若电流变化大→电压表分流不可忽略→用内接法。结论由具体读数定。(2) 替代法：R_x=电阻箱示数（电流相同→等效）；误差：无（或极小）——两次同一电流表、同一电路工作状态，R_x 被电阻箱替代，系统误差被抵消（前提是电阻箱精度足够、电源稳定）。(3) 另法示例（伏阻法）：将电阻箱与 R_x 串联，用电压表分别测 R_x 两端电压和电阻箱两端电压（或总电压），由分压比 R_x/R_箱=U_x/U_箱 求 R_x；或半偏法等。"}, {"step": "④ 易错/陷阱", "text": "「大内小外」前提是与 √(R_A·R_V) 比较：R_x 很小→外接（避开电流表分压），R_x 很大→内接（避开电压表分流）。判定时看谁的读数变化相对更大：电压变化大→电流表分压主导→外接，反之内接。替代法关键：保持滑片位置不变、电流表读数相同，否则不等效（易漏操作要点）。替代法「无/小误差」指系统误差被抵消，仍受电阻箱精度、电源波动限制。设计第三方案要受「给定电路且 P 不动」约束，不能凭空另接。"}], "a": "(1) 由电压表/电流表读数变化相对大小判定：电压变化更大→外接；电流变化更大→内接。(2) R_x=电阻箱示数；无（或极小）明显误差，因等效替代抵消系统误差。(3) 示例：伏阻法（R_x 与电阻箱串联，电压表测两端电压，由分压比求 R_x）。"}];
function buildComprehensive(){
  const wrap=document.getElementById('wrap'); let html='';
  COMPREHENSIVE.forEach(c=>{
    html+='<div class="comp"><h3>'+c.title+'</h3>';
    html+='<div class="csrc">'+c.src+' · '+c.type+'</div>';
    html+='<div class="klist">'+c.knowledge.map(k=>'<span>'+k+'</span>').join('')+'</div>';
    html+='<div class="cq"><b>题目：</b>'+c.q+'</div>';
    if(c.fig) html+='<div class="cfig">'+c.fig+'</div>';
    html+='<div class="bd">';
    c.breakdown.forEach(b=>{ html+='<div class="bstep"><b>'+b.step+'</b>'+b.text+'</div>'; });
    html+='</div>';
    html+='<div class="ca"><b>答案要点：</b>'+c.a+'</div>';
    html+='</div>';
  });
  wrap.innerHTML=html;
}
buildComprehensive();
</script>
